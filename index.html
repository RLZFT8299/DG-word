<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLZFT8299 GitHub RAW</title>
    <style>
        /* ========== 渐变蓝色配色 ========== */
        :root {
            --gradient-blue-1: #1a2980;
            --gradient-blue-2: #26d0ce;
            --gradient-blue-3: #3498db;
            --gradient-blue-4: #2c3e50;
            --gradient-blue-5: #2980b9;
            --light-blue: #e8f4fc;
            --dark-blue: #1a237e;
            --accent-blue: #2196f3;
            --text-dark: #2c3e50;
            --text-light: #5d6d7e;
            --border-radius: 12px;
            --box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--light-blue);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: var(--text-dark);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== 导航栏 ========== */
        .navbar {
            background: linear-gradient(135deg, var(--gradient-blue-1), var(--gradient-blue-2));
            color: white;
            padding: 2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 2px solid rgba(255,255,255,0.15);
            box-shadow: var(--box-shadow);
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
            opacity: 0.9;
        }

        .nav-links a:hover {
            border-bottom-color: white;
            opacity: 1;
        }

        /* ========== 主内容 ========== */
        .display-section {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .section-header {
            margin-bottom: 2rem;
            border-left: 6px solid var(--gradient-blue-2);
            padding-left: 1rem;
        }

        .section-header h2 {
            font-size: 2rem;
            font-weight: 400;
            color: var(--gradient-blue-1);
        }

        .section-header p {
            color: var(--text-light);
            font-size: 1rem;
            margin-top: 0.25rem;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid rgba(52, 152, 219, 0.15);
            box-shadow: var(--box-shadow);
            padding: 1.5rem 1.2rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border-radius: var(--border-radius);
            cursor: pointer;
        }

        .card:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            transform: scale(1.01);
            border-color: var(--gradient-blue-2);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: var(--gradient-blue-2);
        }

        .fake-icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gradient-blue-1), var(--gradient-blue-2));
            border-radius: 8px;
            margin-right: 8px;
            vertical-align: middle;
            opacity: 0.9;
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--gradient-blue-1);
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--light-blue);
            padding-bottom: 0.5rem;
        }

        .card .meta {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .meta span {
            background-color: var(--light-blue);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--text-dark);
        }

        .card p {
            color: var(--text-light);
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
            flex: 1;
        }

        /* 小提示 */
        .info-bar {
            text-align: center;
            color: var(--text-dark);
            font-size: 0.9rem;
            background: var(--light-blue);
            padding: 0.8rem;
            border-radius: var(--border-radius);
            margin-top: 2rem;
            border: 1px solid rgba(38, 208, 206, 0.2);
        }

        .section-divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gradient-blue-2), transparent);
            margin: 2.5rem 0 1.5rem 0;
        }

        /* ========== 模态框 (版本选择浮层) ========== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            max-width: 600px;
            width: 90%;
            box-shadow: var(--box-shadow);
            border: 1px solid var(--gradient-blue-2);
            position: relative;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--light-blue);
            padding-bottom: 0.8rem;
        }

        .modal-header h3 {
            font-size: 1.8rem;
            color: var(--gradient-blue-1);
            font-weight: 500;
        }

        .close-btn {
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--gradient-blue-1);
        }

        .version-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .version-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--light-blue);
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(38, 208, 206, 0.3);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .version-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .version-name {
            font-weight: 600;
            color: var(--gradient-blue-1);
            font-size: 1.1rem;
        }

        .version-meta {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .version-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .version-download {
            background: linear-gradient(135deg, var(--gradient-blue-1), var(--gradient-blue-2));
            color: white;
            text-decoration: none;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(26, 41, 128, 0.2);
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .version-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(38, 208, 206, 0.3);
            background: linear-gradient(135deg, var(--gradient-blue-2), var(--gradient-blue-1));
        }

        .raw-link {
            background: white;
            border: 1px solid var(--gradient-blue-2);
            color: var(--gradient-blue-1);
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
        }

        .raw-link:hover {
            background: var(--gradient-blue-2);
            color: white;
            border-color: transparent;
        }

        .modal-footer {
            text-align: right;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 0.8rem;
                padding: 1.5rem 1rem;
            }
            .nav-links {
                justify-content: center;
                gap: 1.2rem;
            }
            .version-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .version-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="#">日落在福田 · GitHub RAW 下载</a>
            </div>
            <ul class="nav-links">
                <li><a href="https://rlzft8299.github.io/sever-RAW/" target="_blank" rel="noopener noreferrer">个人站点</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主内容：资源卡片列表 (点击卡片弹出版本选择) -->
    <main class="display-section">
        <div class="section-header">
            <h2>GitHub RAW</h2>
            <p>点击卡片选择版本，直接获取对应 raw 文件</p>
        </div>

        <!-- 卡片网格会通过JS动态生成 -->
        <div class="card-grid" id="resourceGrid"></div>

        <div class="info-bar">
            ⚡ 所有链接均为 GitHub 上不同 Tag 的 raw 文件。每个版本提供“下载 RAW”（强制保存）和“🔗 raw”（在新标签页打开）两种方式。
        </div>
        <div class="section-divider"></div>
    </main>

    <!-- 版本选择模态框 (隐藏) -->
    <div id="versionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalResourceName">资源名称</h3>
                <span class="close-btn" id="closeModalBtn">&times;</span>
            </div>
            <div id="versionListContainer" class="version-list">
                <!-- 版本项会动态插入 -->
            </div>
            <div class="modal-footer">
                点击按钮下载或打开 raw 链接
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ----- 资源与版本数据：所有下载链接均为 GitHub raw 链接 -----
            const resources = [
                {
                    id: '个人网站-HTML',
                    name: '个人网站-HTML',
                    description: '个人网站的 HTML 文件 (raw)',
                    iconColor: 'linear-gradient(135deg, #1a2980, #3498db)',
                    versions: [


                        
                        { name: 'v1.10.3 (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.10.3.html' },
                        { name: 'v1.10.2 (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.10.2.html' },
                        { name: 'v1.10.1 (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.10.1.html' },
                        { name: 'v1.10.0 (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.10.html' },
                        { name: 'v1.9.3  (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.9.3.html' },
                        { name: 'v1.9.2S (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.9.2S.html' },
                        { name: 'v1.9.2  (HTML)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-myinter.ps/refs/heads/main/%E6%97%A5%E8%90%BD%E5%9C%A8%E7%A6%8F%E7%94%B0%E7%BD%91%E7%AB%99v1.9.2.html' },
                        { name: 'README (MD)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/RLZFT8299-sever/refs/heads/main/README.md' }
                    ]
                },
                {
                    id: 'base+工具扩展-PY',
                    name: 'base+工具扩展-PY',
                    description: 'base+工具扩展的 Python 文件 (raw)',
                    iconColor: 'linear-gradient(135deg, #26d0ce, #2980b9)',
                    versions: [
                        { name: 'base+工具扩展v1.2.5x', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/base-sever/refs/heads/main/base%2B1.2.5x.py' },
                        { name: 'base+工具扩展v1.2.5', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/base-sever/refs/heads/main/base%2Bv1.2.5.py' },
                        { name: 'base+工具扩展v1.2.3', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/base-sever/refs/heads/main/base%2Bv1.2.3.py' },
                        { name: 'base+工具扩展v1.2.1', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/base-sever/refs/heads/main/base%2Bv1.2.1.py' },
                        { name: 'base+工具扩展v1.2.0', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/base-sever/refs/heads/main/base%2Bv1.2.0.py' },
                        { name: 'README (MD)', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/base-sever/refs/heads/main/README.md' }
                    ]
                },
                {
                    id: 'pack打包专版',
                    name: 'pack打包专版',
                    description: '打包专版的文件 (git)',
                    iconColor: 'linear-gradient(135deg, #2c3e50, #26d0ce)',
                    versions: [
                        { name: '打包专版.exe', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/shaderpacks/refs/heads/main/%E5%85%A8%E8%87%AA%E5%8A%A8%E7%A8%8B%E5%BA%8F%E6%89%93%E5%8C%85.exe' },
                        { name: '打包专版.py', date: '', url: 'https://raw.githubusercontent.com/RLZFT8299/shaderpacks/refs/heads/main/%E5%85%A8%E8%87%AA%E5%8A%A8%E7%A8%8B%E5%BA%8F%E6%89%93%E5%8C%85.py' }
                        
                    ]
                }
            ];

            // ----- 渲染卡片网格 -----
            const grid = document.getElementById('resourceGrid');
            function renderCards() {
                grid.innerHTML = '';
                resources.forEach(res => {
                    const card = document.createElement('article');
                    card.className = 'card';
                    card.setAttribute('data-resource-id', res.id);
                    card.addEventListener('click', () => openModal(res));
                    card.innerHTML = `
                        <div class="card-icon"><span class="fake-icon" style="background: ${res.iconColor};"></span></div>
                        <h3>${res.name}</h3>
                        <div class="meta"><span>raw 文件</span><span>${res.versions.length} 个版本</span></div>
                        <p>${res.description}</p>
                        <div style="margin-top: auto; color: var(--gradient-blue-2); font-size:0.9rem;">点击选择版本 ⬇</div>
                    `;
                    grid.appendChild(card);
                });
            }
            renderCards();

            // ----- 模态框元素 -----
            const modal = document.getElementById('versionModal');
            const modalResourceName = document.getElementById('modalResourceName');
            const versionListContainer = document.getElementById('versionListContainer');
            const closeBtn = document.getElementById('closeModalBtn');

            function closeModal() {
                modal.style.display = 'none';
            }

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });

            // ----- 强制下载函数 (fetch + blob) -----
            async function forceDownload(url, suggestedName) {
                try {
                    const response = await fetch(url, { mode: 'cors' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const blob = await response.blob();
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = suggestedName;
                    if (contentDisposition) {
                        const match = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                        if (match && match[1]) filename = match[1].replace(/['"]/g, '');
                    }
                    if (!filename) {
                        const urlParts = url.split('/');
                        filename = urlParts[urlParts.length-1] || 'download';
                    }
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                } catch (err) {
                    alert('下载失败：' + err.message + '\n您可以尝试右键点击 raw 链接，选择“链接另存为”。');
                }
            }

            // 挂载到 window 供 onclick 调用
            window.forceDownload = forceDownload;

            function openModal(resource) {
                modalResourceName.textContent = resource.name;
                let versionsHtml = '';
                resource.versions.forEach(v => {
                    // 生成建议文件名：资源名-版本名-原始文件名
                    const urlParts = v.url.split('/');
                    let baseName = urlParts[urlParts.length-1];
                    if (!baseName.includes('.')) baseName = 'file';
                    const suggestedName = `${resource.name.replace(/\s+/g, '-')}-${v.name.replace(/\s+/g, '-')}-${baseName}`;
                    versionsHtml += `
                        <div class="version-item">
                            <div class="version-info">
                                <span class="version-name">${v.name}</span>
                                <span class="version-meta">${v.date}</span>
                            </div>
                            <div class="version-actions">
                                <button class="version-download" onclick="event.stopPropagation(); (async () => { 
                                    const url = '${v.url}'; 
                                    const suggested = '${suggestedName}';
                                    await forceDownload(url, suggested); 
                                })()">下载 RAW</button>
                                <a href="${v.url}" class="raw-link" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();">🔗 raw</a>
                            </div>
                        </div>
                    `;
                });
                versionListContainer.innerHTML = versionsHtml;
                modal.style.display = 'flex';
            }
        })();
    </script>
</body>
</html>
